name: Release Marianne AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            features: "custom-protocol,fastembed,vectordb"
            artifact-name: marianne-windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: "custom-protocol,fastembed,vectordb"
            artifact-name: marianne-linux-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            features: "custom-protocol,fastembed,vectordb"
            artifact-name: marianne-macos-arm64
          # macos-13 (x86_64) désactivé — runner obsolète
          # - platform: macos-13
          #   target: x86_64-apple-darwin
          #   features: "custom-protocol,fastembed,vectordb"
          #   artifact-name: marianne-macos-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: marianne/src-tauri
          key: ${{ matrix.target }}

      - name: Install protobuf (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libprotobuf-dev \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install protobuf (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: brew install protobuf cmake

      - name: Set macOS deployment target
        if: startsWith(matrix.platform, 'macos')
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Install protobuf (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install protoc cmake --yes

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri app
        working-directory: marianne
        run: cargo tauri build --target ${{ matrix.target }} -- --no-default-features --features ${{ matrix.features }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            marianne/target/${{ matrix.target }}/release/bundle/msi/*.msi
            marianne/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            marianne/target/${{ matrix.target }}/release/bundle/deb/*.deb
            marianne/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: marianne/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Marianne AI ${{ github.ref_name }}"
          draft: false
          generate_release_notes: true
          body: |
            ## 🇫🇷 Marianne AI ${{ github.ref_name }}

            Assistant administratif français 100% local avec IA embarquée.

            ### Fonctionnalités
            - LLM local Phi-3-Mini 3.8B (téléchargé au premier lancement)
            - RAG hybride (base vectorielle + graphe de connaissances)
            - Corpus juridique français intégré
            - Recherche web sur sources officielles
            - Analyse de documents PDF
            - Accélération GPU CUDA (build séparé ou compilation locale)

            ### Installation
            Téléchargez l'installeur correspondant à votre OS ci-dessous.
            Au premier lancement, le modèle IA (~2.2 Go) sera téléchargé automatiquement.
          files: artifacts/**/*
