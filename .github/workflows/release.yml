name: Release Marianne AI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            features: "custom-protocol,fastembed,vectordb,vulkan"
            artifact-name: marianne-windows-x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: "custom-protocol,fastembed,vectordb,vulkan"
            artifact-name: marianne-linux-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            features: "custom-protocol,fastembed,vectordb,metal"
            artifact-name: marianne-macos-arm64
          # macos-13 (x86_64) désactivé — runner obsolète
          # - platform: macos-13
          #   target: x86_64-apple-darwin
          #   features: "custom-protocol,fastembed,vectordb"
          #   artifact-name: marianne-macos-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="0.0.0"
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version from tag: $VERSION"
          # Update tauri.conf.json (cross-platform sed)
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" marianne/src-tauri/tauri.conf.json
            sed -i '' "1,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/;}" marianne/src-tauri/Cargo.toml
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" marianne/src-tauri/tauri.conf.json
            sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" marianne/src-tauri/Cargo.toml
          fi
          # Verify
          grep '"version"' marianne/src-tauri/tauri.conf.json
          grep '^version' marianne/src-tauri/Cargo.toml | head -1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: marianne/src-tauri
          key: ${{ matrix.target }}

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Verify Vulkan SDK env (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "VULKAN_SDK=$env:VULKAN_SDK"
          if ($env:VULKAN_SDK -and (Test-Path $env:VULKAN_SDK)) {
            Get-ChildItem $env:VULKAN_SDK -Depth 0 | ForEach-Object { Write-Host "  $_" }
          }
          # Verify headers, libs and shader compiler
          $inc = Join-Path $env:VULKAN_SDK "Include\vulkan\vulkan.h"
          $lib = Join-Path $env:VULKAN_SDK "Lib\vulkan-1.lib"
          $glslc = Join-Path $env:VULKAN_SDK "Bin\glslc.exe"
          if (-not (Test-Path $inc))   { Write-Error "Missing $inc";   exit 1 }
          if (-not (Test-Path $lib))   { Write-Error "Missing $lib";   exit 1 }
          if (-not (Test-Path $glslc)) { Write-Error "Missing $glslc — needed for Vulkan shader compilation"; exit 1 }
          Write-Host "Vulkan SDK verified OK (glslc found)"

      - name: Install protobuf (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libprotobuf-dev \
            cmake \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libvulkan-dev \
            vulkan-tools \
            glslc

      - name: Install protobuf (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: brew install protobuf cmake

      - name: Set macOS deployment target
        if: startsWith(matrix.platform, 'macos')
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Install protobuf (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install protoc --yes

      - name: Setup MSVC dev environment (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Shorten build path & fix Vulkan shader build (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # 1. Short target dir to avoid MAX_PATH in deeply nested ExternalProject paths
          echo "CARGO_TARGET_DIR=D:\cb" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Path "D:\cb" -Force | Out-Null
          # 2. Use Ninja generator instead of VS to fix ExternalProject race condition
          #    (MSBuild runs configure/install steps in parallel on different nodes,
          #     causing cmake_install.cmake to be missing when install runs)
          echo "CMAKE_GENERATOR=Ninja" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # 3. /FS for serialized PDB access (safety net)
          echo "CFLAGS=/FS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CXXFLAGS=/FS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "CARGO_TARGET_DIR=D:\cb, CMAKE_GENERATOR=Ninja"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri app
        working-directory: marianne
        env:
          RUST_BACKTRACE: '1'
          CMAKE_VERBOSE_MAKEFILE: 'ON'
        run: cargo tauri build --target ${{ matrix.target }} -- --no-default-features --features ${{ matrix.features }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            D:/cb/${{ matrix.target }}/release/bundle/msi/*.msi
            D:/cb/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            marianne/target/${{ matrix.target }}/release/bundle/deb/*.deb
            marianne/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: marianne/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Marianne AI ${{ github.ref_name }}"
          draft: false
          generate_release_notes: true
          body: |
            ## 🇫🇷 Marianne AI ${{ github.ref_name }}

            Assistant administratif français 100% local avec IA embarquée.

            ### Fonctionnalités
            - LLM local Phi-3-Mini 3.8B (téléchargé au premier lancement)
            - RAG hybride (base vectorielle + graphe de connaissances)
            - Corpus juridique français intégré
            - Recherche web sur sources officielles
            - Analyse de documents PDF
            - Accélération GPU automatique (Vulkan sur Windows/Linux, Metal sur macOS)

            ### Installation
            Téléchargez l'installeur correspondant à votre OS ci-dessous.
            Au premier lancement, le modèle IA (~2.2 Go) sera téléchargé automatiquement.
          files: artifacts/**/*
